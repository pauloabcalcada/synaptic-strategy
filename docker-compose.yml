services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: synaptic
      POSTGRES_PASSWORD: synaptic
      POSTGRES_DB: synaptic_strategy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
